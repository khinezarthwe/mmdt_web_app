{% extends "base.html" %}
{% block content %}
  <h2>Active Surveys</h2>
  {% if submitted_successfully %}
    <p class="vote-success-message">🎉🎉 Thank you for taking our survey! 😊😊</p>
    <a href="{% url 'survey:index' %}" class="button underline">Go back</a>
  {% else %}
    <ul>
      {% for survey in surveys %}
      <li>
        <a href="{% url 'survey:survey_detail' survey.id %}">{{ survey.title }}</a>
      </li>
      {% endfor %}
    </ul>
  {% endif %}
  <a href="{% url 'survey:all_results' %}" class="button view-btn">View Survey Results</a>
{% endblock %}
